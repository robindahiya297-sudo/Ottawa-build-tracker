name: Daily Ottawa New Homes Scrape

on:
  schedule:
    # GitHub cron runs in UTC. 11:00 UTC = 6:00 AM EST (winter).
    # During daylight saving (EDT) this fires at 7:00 AM local;
    # switch to '0 10 * * *' if you want 6:00 AM EDT instead.
    - cron: '0 11 * * *'
  workflow_dispatch: {}  # allows manual runs from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_NAME: 'Ottawa New Construction Leads'
        run: python scraper.py
